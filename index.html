<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta -->
    <title>StackForge — Master Modern Software Development</title>
    <meta name="description" content="Learn web development, AI, cloud computing, system design, and programming through interactive roadmaps, hands-on projects, and expert-written guides. 50,000+ learners trust StackForge." />
    <meta name="keywords" content="programming, web development, React, Python, JavaScript, TypeScript, Node.js, DevOps, AI, machine learning, coding tutorials, learning platform" />
    <meta name="author" content="StackForge" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="StackForge" />
    <meta property="og:title" content="StackForge — Master Modern Software Development" />
    <meta property="og:description" content="Learn web development, AI, cloud computing, and programming through interactive roadmaps, hands-on projects, and expert-written guides." />
    <meta property="og:url" content="https://stackforge.dev" />
    <meta property="og:image" content="https://stackforge.dev/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="StackForge — Master Modern Software Development" />
    <meta name="twitter:description" content="Learn web development, AI, cloud computing, and programming through interactive roadmaps, hands-on projects, and expert-written guides." />
    <meta name="twitter:image" content="https://stackforge.dev/og-image.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "StackForge",
      "url": "https://stackforge.dev",
      "description": "Master modern software development with free courses, interactive roadmaps, hands-on projects, and expert-written guides.",
      "sameAs": [],
      "foundingDate": "2024",
      "areaServed": "Worldwide"
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <!-- Prevent flash of wrong theme -->
    <script>
      (function() {
        var theme = localStorage.getItem('stackforge-theme');
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
